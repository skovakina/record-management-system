name: tests

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb python3-tk
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest pytest-custom_exit_code

      - name: Check that source compiles
        run: python -m compileall -q src tests

      - name: Run tests
        run: xvfb-run -a python -m pytest --suppress-no-test-exit-code
